<body class="rounded">
<app-spinner class="spinner-em-cima" [isLoading]="isLoading"></app-spinner>
  <div class="d-flex justify-content-center align-items-center p-3">
    <app-form-pokedex (onValueChange)="onTextChange($event)" class=" col-sm-6 col-md-6 col-lg-6 col-6"></app-form-pokedex>
  </div>

<div *ngIf="details" class="d-flex justify-content-center align-items-center mb-3">
  <div [ngClass]="{'abrir': details, 'fechar': !details}" class="scale-y-transform">
    <app-card-details-pokedex [pokemon]="pokemonSelecionado"></app-card-details-pokedex>
  </div>
</div>

<div *ngIf="searchResults.length > 0; else showAll">
  <div class="row my-3">
    <div *ngFor="let pokemon of searchResults" class="d-flex justify-content-center align-items-center col-sm-6 col-md-4 col-lg-3 col-12">
      <app-card-pokedex [pokemon]="pokemon" (click)="detailsMetod(pokemon)"  type="button" ></app-card-pokedex>
    </div>
  </div>
</div>

<ng-template #showAll>
  <div class="row">
    <div *ngFor="let pokemon of pokemonsDetails" class="d-flex justify-content-center align-items-center col-sm-6 col-md-4 col-lg-3 col-12">
      <app-card-pokedex [pokemon]="pokemon" (click)="detailsMetod(pokemon)" type="button"></app-card-pokedex>
    </div>
  </div>
</ng-template>
</body>
